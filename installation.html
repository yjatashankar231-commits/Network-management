<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Installation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-blue-50 p-5">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-5 mt-10">
        <h1 class="text-2xl font-bold text-blue-600 mb-5">🛠 New Installation</h1>

        <input id="customer" type="text" placeholder="Customer Name" class="w-full border rounded-lg p-3 mb-3">
        <input id="mobile" type="tel" placeholder="Mobile Number" class="w-full border rounded-lg p-3 mb-3">
        <input id="address" type="text" placeholder="Address" class="w-full border rounded-lg p-3 mb-3">

        <select id="isp" class="w-full border rounded-lg p-3 mb-3">
            <option value="">Select ISP</option>
            <option>Airtel</option>
            <option>Jio</option>
            <option>GTPL</option>
        </select>

        <div class="flex gap-2">
            <button onclick="window.location.href='index.html'" class="w-1/3 bg-gray-200 text-gray-700 rounded-lg p-3 hover:bg-gray-300">Cancel</button>
            <button onclick="saveInstallation()" class="w-2/3 bg-blue-600 text-white rounded-lg p-3 hover:bg-blue-700">Save Installation</button>
        </div>
    </div>

    <script>
    function saveInstallation(){
        let customer = document.getElementById("customer").value.trim();
        let mobile = document.getElementById("mobile").value.trim();
        let address = document.getElementById("address").value.trim();
        let isp = document.getElementById("isp").value;

        if(customer=="" || mobile=="" || address=="" || isp==""){
            alert("Please fill all fields");
            return;
        }

        let records = JSON.parse(localStorage.getItem("installationData")) || [];
        records.push({
            customer: customer,
            mobile: mobile,
            address: address,
            isp: isp,
            date: new Date().toLocaleString()
        });

        localStorage.setItem("installationData", JSON.stringify(records));
        localStorage.setItem("installation", records.length);

        alert("Installation Saved Successfully");
        window.location.href = "index.html";
    }
    </script>
</body>
</html>
