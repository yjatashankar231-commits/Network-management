<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Service Request (SR)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-blue-50 p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-emerald-600 to-teal-500 p-5 text-white flex items-center space-x-3">
            <div class="bg-white/20 p-2.5 rounded-xl text-xl shadow-inner">
                <i class="fa-solid fa-phone"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wide">New SR Entry</h1>
                <p class="text-xs text-emerald-100">Service Request & Complaint Log</p>
            </div>
        </div>

        <div class="p-6 space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase block mb-1">Customer Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-user text-sm"></i>
                    </span>
                    <input id="sr-customer" type="text" placeholder="Enter customer name" class="w-full border border-gray-200 rounded-xl p-3 pl-10 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition shadow-sm">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 uppercase block mb-1">DSL ID / Customer ID</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-id-card text-sm"></i>
                    </span>
                    <input id="sr-dsl" type="text" placeholder="Enter DSL ID" class="w-full border border-gray-200 rounded-xl p-3 pl-10 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition shadow-sm">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 uppercase block mb-1">Mobile Number</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-phone text-sm"></i>
                    </span>
                    <input id="sr-mobile" type="tel" placeholder="Enter mobile number" class="w-full border border-gray-200 rounded-xl p-3 pl-10 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition shadow-sm">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 uppercase block mb-1">Select ISP</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-globe text-sm"></i>
                    </span>
                    <select id="sr-isp" class="w-full border border-gray-200 rounded-xl p-3 pl-10 bg-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition shadow-sm appearance-none">
                        <option value="">Select ISP</option>
                        <option>GTPL</option>
                        <option>Airtel</option>
                        <option>Jio</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 uppercase block mb-1">Address / Location</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pt-3.5 pl-3 text-gray-400 block h-full">
                        <i class="fa-solid fa-location-dot text-sm"></i>
                    </span>
                    <textarea id="sr-address" rows="2" placeholder="Enter complete address" class="w-full border border-gray-200 rounded-xl p-3 pl-10 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition shadow-sm"></textarea>
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <button onclick="window.location.href='index.html'" class="w-1/3 border border-gray-200 text-gray-600 font-semibold rounded-xl p-3 hover:bg-gray-50 transition shadow-sm cursor-pointer text-center">
                    Cancel
                </button>
                <button onclick="saveSR()" class="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl p-3 transition shadow-md cursor-pointer text-center">
                    Save SR Report
                </button>
            </div>
        </div>
    </div>

    <script>
    function saveSR(){
        let customer = document.getElementById("sr-customer").value.trim();
        let dslId = document.getElementById("sr-dsl").value.trim();
        let mobile = document.getElementById("sr-mobile").value.trim();
        let isp = document.getElementById("sr-isp").value;
        let address = document.getElementById("sr-address").value.trim();

        // Validation Check
        if(customer=="" || dslId=="" || mobile=="" || isp=="" || address==""){
            alert("Kripya sabhi fields ko bharein!");
            return;
        }

        // Fetch existing records or create a new array
        let srRecords = JSON.parse(localStorage.getItem("srData")) || [];
        
        // Push current form data
        srRecords.push({
            customer: customer,
            dslId: dslId,
            mobile: mobile,
            isp: isp,
            address: address,
            date: new Date().toLocaleString()
        });

        // Save back to LocalStorage
        localStorage.setItem("srData", JSON.stringify(srRecords));
        localStorage.setItem("sr", srRecords.length);

        alert("SR Data Saved Successfully!");
        
        // Go back to main dashboard
        window.location.href = "index.html";
    }
    </script>
</body>
</html>
