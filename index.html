<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiber Work Manager - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        .page-tab { display: none; }
        .page-tab.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen flex flex-col pb-16">

    <div id="login-screen" class="fixed inset-0 bg-gradient-to-br from-blue-700 to-indigo-900 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm space-y-5 text-center">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto shadow-inner">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <div>
                <h2 class="text-xl font-black text-gray-900 tracking-wide">Fiber Manager</h2>
                <p class="text-xs text-gray-400 mt-0.5">Enter Registered Mobile Number</p>
            </div>
            <div class="space-y-3">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 font-bold text-sm">+91</span>
                    <input id="login-mobile" type="tel" maxlength="10" placeholder="10 Digit Number" class="w-full border rounded-xl p-3.5 pl-12 outline-none focus:ring-2 focus:ring-blue-500 font-black tracking-widest text-lg text-gray-700 bg-gray-50">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition duration-200 text-sm tracking-wide">
                    Login Securely <i class="fa-solid fa-arrow-right-to-bracket ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden flex flex-col min-h-screen w-full">

        <header class="bg-gradient-to-r from-blue-600 to-blue-500 text-white px-5 py-3.5 flex justify-between items-center shadow-md shrink-0 fixed top-0 w-full z-40 max-w-md mx-auto inset-x-0">
            <div class="flex items-center space-x-3">
                <div class="bg-white/20 p-2 rounded-full text-lg"><i class="fa-solid fa-satellite-dish"></i></div>
                <div>
                    <h1 class="text-base font-black tracking-wide leading-tight">Fiber Manager</h1>
                    <p id="app-role-badge" class="text-[10px] text-blue-100 font-bold bg-white/20 px-1.5 rounded-sm inline-block"></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500/20 hover:bg-red-500/40 text-red-100 font-bold px-3 py-1.5 rounded-lg text-xs transition border border-red-400/30">
                <i class="fa-solid fa-power-off"></i> Exit
            </button>
        </header>

        <main class="flex-1 max-w-md mx-auto w-full p-4 pt-20 overflow-y-auto mb-16">

            <div id="tab-home" class="page-tab active space-y-4">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-3">
                        <div class="text-blue-500 text-2xl"><i class="fa-solid fa-box-archive"></i></div>
                        <div>
                            <h3 id="count-install" class="text-lg font-black text-slate-800">0</h3>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Installs</p>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-3">
                        <div class="text-red-500 text-2xl"><i class="fa-solid fa-phone-slash"></i></div>
                        <div>
                            <h3 id="count-sr" class="text-lg font-black text-slate-800">0</h3>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">SR Logs</p>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <h2 class="text-xs font-bold text-blue-600 tracking-wider uppercase pl-1">Work Actions</h2>
                    
                    <button onclick="switchTab('install')" class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center w-full active:bg-slate-50 transition">
                        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center text-lg mr-3"><i class="fa-solid fa-plus-circle"></i></div>
                        <div class="text-left flex-1">
                            <h4 class="font-bold text-sm text-slate-700">Add Installation</h4>
                            <p class="text-[10px] text-slate-400">Manual ISP Entry</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300"></i>
                    </button>

                    <button onclick="switchTab('sr')" class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center w-full active:bg-slate-50 transition">
                        <div class="w-10 h-10 bg-red-50 text-red-500 rounded-lg flex items-center justify-center text-lg mr-3"><i class="fa-solid fa-triangle-exclamation"></i></div>
                        <div class="text-left flex-1">
                            <h4 class="font-bold text-sm text-slate-700">Add SR Fault</h4>
                            <p class="text-[10px] text-slate-400">Log new network fault</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300"></i>
                    </button>

                    <button onclick="switchTab('restore')" class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center w-full active:bg-slate-50 transition">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-lg flex items-center justify-center text-lg mr-3"><i class="fa-solid fa-signal"></i></div>
                        <div class="text-left flex-1">
                            <h4 class="font-bold text-sm text-slate-700">Site Restore</h4>
                            <p class="text-[10px] text-slate-400">Fatbox power metrics</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300"></i>
                    </button>
                </div>
            </div>

            <div id="tab-users" class="page-tab space-y-4">
                <div class="bg-gradient-to-br from-indigo-800 to-slate-900 text-white p-5 rounded-xl shadow-md">
                    <h2 class="font-bold text-base border-b border-white/20 pb-2 mb-3"><i class="fa-solid fa-users-gear mr-2"></i> User & Sub-Admin Control</h2>
                    <div class="space-y-3 text-sm">
                        <input id="new-user-name" type="text" placeholder="Full Name" class="w-full bg-white/10 border border-white/20 rounded-lg p-3 outline-none focus:ring-1 focus:ring-blue-400 placeholder-white/50 text-white">
                        <input id="new-user-mobile" type="tel" maxlength="10" placeholder="10 Digit Mobile Number" class="w-full bg-white/10 border border-white/20 rounded-lg p-3 outline-none focus:ring-1 focus:ring-blue-400 placeholder-white/50 text-white">
                        <select id="new-user-role" class="w-full bg-white/10 border border-white/20 rounded-lg p-3 outline-none focus:ring-1 focus:ring-blue-400 text-white appearance-none">
                            <option value="engineer" class="text-black">Field Engineer</option>
                            <option value="admin" class="text-black">Admin (Full Access)</option>
                        </select>
                        <button onclick="saveUser()" class="w-full bg-amber-500 text-slate-900 font-bold rounded-lg p-3 hover:bg-amber-400 transition">Create User Profile</button>
                    </div>
                </div>
                
                <h3 class="text-xs font-bold text-gray-500 uppercase">Registered System Users</h3>
                <div id="users-list" class="space-y-2"></div>
            </div>

            <div id="tab-assign" class="page-tab space-y-4">
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-3">
                    <h2 class="font-bold text-base text-blue-600 border-b pb-2"><i class="fa-solid fa-clipboard-list mr-1"></i> Assign New Work</h2>
                    
                    <select id="task-user" class="w-full border rounded-lg p-3 font-semibold outline-none focus:ring-2 focus:ring-blue-400"></select>
                    
                    <input id="task-cust-name" type="text" placeholder="Customer / Site Name" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-400">
                    <input id="task-cust-mobile" type="tel" maxlength="10" placeholder="Customer Mobile (For Calling)" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-400">
                    <textarea id="task-details" rows="2" placeholder="Task Details & Address..." class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                    
                    <label class="block w-full bg-slate-50 border border-dashed border-slate-300 text-slate-500 font-bold px-3 py-3 rounded-lg text-center cursor-pointer hover:bg-slate-100 text-sm">
                        <i class="fa-solid fa-paperclip mr-1"></i> Attach Reference Photo
                        <input type="file" accept="image/*" onchange="encodeTaskPhoto(this)" class="hidden">
                    </label>
                    <input type="hidden" id="task-photo-base64">
                    <p id="task-photo-msg" class="text-[10px] text-emerald-600 font-bold hidden"><i class="fa-solid fa-check-circle"></i> Photo Attached</p>

                    <button onclick="saveTask()" class="w-full bg-blue-600 text-white font-bold rounded-lg p-3 shadow-md hover:bg-blue-700">Dispatch Task</button>
                </div>
            </div>

            <div id="tab-mytasks" class="page-tab space-y-3">
                <h2 class="text-sm font-black text-indigo-700 bg-indigo-50 p-3 rounded-lg border border-indigo-100">My Field Dispatch Board</h2>
                <div id="mytasks-list" class="space-y-4"></div>
            </div>

            <div id="tab-install" class="page-tab space-y-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="font-bold text-base text-blue-600 border-b pb-2"><i class="fa-solid fa-network-wired mr-1"></i> New Installation</h2>
                
                <div class="space-y-3 text-sm">
                    <input id="ins-isp" type="text" placeholder="Type ISP Name (e.g. Airtel, Jio, GTPL)" class="w-full border rounded-lg p-3 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                    <input id="ins-order-id" type="text" placeholder="Order ID" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    
                    <input id="ins-customer" type="text" placeholder="Customer Name & Detail" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    <textarea id="ins-address" rows="2" placeholder="Complete Address" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <label class="bg-slate-50 border p-2 rounded-lg text-center cursor-pointer text-xs font-bold text-slate-600">
                            <i class="fa-solid fa-camera mb-1 block"></i> Photo Capture
                            <input type="file" accept="image/*" onchange="encodeBase64(this, 'ins-photo')" class="hidden">
                        </label>
                        <label class="bg-slate-50 border p-2 rounded-lg text-center cursor-pointer text-xs font-bold text-slate-600">
                            <i class="fa-solid fa-file-pdf mb-1 block"></i> PDF Upload
                            <input type="file" accept=".pdf" onchange="encodeBase64(this, 'ins-pdf')" class="hidden">
                        </label>
                    </div>
                    <input type="hidden" id="ins-photo">
                    <input type="hidden" id="ins-pdf">
                    <p id="ins-upload-msg" class="text-[10px] text-emerald-600 font-bold hidden text-center">Files Ready</p>

                    <button onclick="saveData('install')" class="w-full bg-blue-600 text-white font-bold rounded-lg p-3">Submit Installation</button>
                </div>
            </div>

            <div id="tab-sr" class="page-tab space-y-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="font-bold text-base text-red-500 border-b pb-2"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Log SR Fault</h2>
                <div class="space-y-3 text-sm">
                    <input id="sr-fault" type="text" placeholder="Type Fault (e.g. Fiber Cut, Red LOS)" class="w-full border border-red-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-red-400 font-bold text-red-700">
                    <input id="sr-ticket" type="text" placeholder="SR / Ticket Number" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-red-400">
                    <input id="sr-customer" type="text" placeholder="Customer Name & Details" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-red-400">
                    <textarea id="sr-resolve" rows="2" placeholder="Resolution Steps Taken..." class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-red-400"></textarea>
                    
                    <button onclick="saveData('sr')" class="w-full bg-red-500 text-white font-bold rounded-lg p-3">Save SR Ticket</button>
                </div>
            </div>

            <div id="tab-restore" class="page-tab space-y-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="font-bold text-base text-emerald-600 border-b pb-2"><i class="fa-solid fa-signal mr-1"></i> Site Restore</h2>
                <div class="space-y-3 text-sm">
                    <input id="rest-id" type="text" placeholder="Manual Type Node/Fatbox ID" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-emerald-400 font-bold">
                    <input id="rest-power" type="text" placeholder="Power Level (e.g. -21.5 dBm)" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-emerald-400">
                    <textarea id="rest-remarks" rows="2" placeholder="Remarks..." class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-emerald-400"></textarea>
                    
                    <button onclick="saveData('restore')" class="w-full bg-emerald-600 text-white font-bold rounded-lg p-3">Submit Restoration</button>
                </div>
            </div>

            <div id="tab-data" class="page-tab space-y-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="font-bold text-sm text-slate-800"><i class="fa-solid fa-database mr-1"></i> System Records</h2>
                        <button onclick="resetData()" class="text-[10px] text-red-500 border border-red-200 px-2 py-1 rounded bg-red-50 font-bold"><i class="fa-solid fa-trash"></i> Reset</button>
                    </div>
                    <div id="ledger-content" class="text-xs space-y-4"></div>
                </div>
            </div>

        </main>

        <nav class="bg-white border-t border-slate-200 fixed bottom-0 w-full max-w-md mx-auto inset-x-0 z-50 flex justify-around pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onclick="switchTab('home')" class="nav-btn w-full py-3 text-slate-400 flex flex-col items-center hover:text-blue-600 transition" data-target="home">
                <i class="fa-solid fa-home text-lg mb-1"></i><span class="text-[9px] font-bold">Home</span>
            </button>
            <button id="nav-mytasks" onclick="switchTab('mytasks')" class="nav-btn w-full py-3 text-slate-400 flex flex-col items-center hover:text-blue-600 transition" data-target="mytasks">
                <i class="fa-solid fa-briefcase text-lg mb-1"></i><span class="text-[9px] font-bold">My Tasks</span>
            </button>
            <button id="nav-assign" onclick="switchTab('assign')" class="nav-btn hidden w-full py-3 text-slate-400 flex flex-col items-center hover:text-blue-600 transition" data-target="assign">
                <i class="fa-solid fa-clipboard-check text-lg mb-1"></i><span class="text-[9px] font-bold">Assign</span>
            </button>
            <button id="nav-users" onclick="switchTab('users')" class="nav-btn hidden w-full py-3 text-slate-400 flex flex-col items-center hover:text-blue-600 transition" data-target="users">
                <i class="fa-solid fa-users text-lg mb-1"></i><span class="text-[9px] font-bold">Users</span>
            </button>
            <button onclick="switchTab('data')" class="nav-btn w-full py-3 text-slate-400 flex flex-col items-center hover:text-blue-600 transition" data-target="data">
                <i class="fa-solid fa-list-ul text-lg mb-1"></i><span class="text-[9px] font-bold">Records</span>
            </button>
        </nav>
    </div>

    <script>
        // Data Structures
        const MASTER_ADMIN = "9142173747";
        let currentUser = null;

        // On Page Load: Session Persistence Engine
        window.onload = () => {
            const session = localStorage.getItem('fib_session');
            if (session) {
                currentUser = JSON.parse(session);
                bootApp();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        };

        // Storage Helpers
        function getStore(key) { return JSON.parse(localStorage.getItem(key)) || []; }
        function setStore(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

        // Login System
        function handleLogin() {
            const mobile = document.getElementById('login-mobile').value.trim();
            if (mobile.length !== 10) return alert("Enter valid 10 digit number.");

            if (mobile === MASTER_ADMIN) {
                currentUser = { name: "Master Admin", mobile: mobile, role: "admin" };
            } else {
                const users = getStore('fib_users');
                const user = users.find(u => u.mobile === mobile);
                if (user) {
                    currentUser = user;
                } else {
                    return alert("Number not registered! Ask Admin to add you.");
                }
            }
            
            // Save Session
            setStore('fib_session', currentUser);
            bootApp();
        }

        function logout() {
            localStorage.removeItem('fib_session');
            window.location.reload();
        }

        // Boot UI based on Role
        function bootApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            
            document.getElementById('app-role-badge').innerText = currentUser.role === 'admin' ? '👑 Admin Access' : `👷 Eng: ${currentUser.name}`;

            if (currentUser.role === 'admin') {
                document.getElementById('nav-assign').classList.remove('hidden');
                document.getElementById('nav-users').classList.remove('hidden');
            } else {
                document.getElementById('nav-assign').classList.add('hidden');
                document.getElementById('nav-users').classList.add('hidden');
            }

            updateDash();
            switchTab('home');
        }

        // Navigation Controller
        function switchTab(tabId) {
            // Hide all tabs
            document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
            const tab = document.getElementById('tab-' + tabId);
            if (tab) tab.classList.add('active');

            // Bottom Nav Colors
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.querySelector(`.nav-btn[data-target="${tabId}"]`);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-400');
                activeBtn.classList.add('text-blue-600');
            }

            // Trigger Specific Loads
            if (tabId === 'users') loadUsers();
            if (tabId === 'assign') loadAssignDrop();
            if (tabId === 'mytasks') loadMyTasks();
            if (tabId === 'data') renderLedger();
        }

        function updateDash() {
            document.getElementById('count-install').innerText = getStore('fib_installs').length;
            document.getElementById('count-sr').innerText = getStore('fib_srs').length;
        }

        // User Management (Admin creates Sub-Admins & Engineers)
        function saveUser() {
            const name = document.getElementById('new-user-name').value;
            const mobile = document.getElementById('new-user-mobile').value;
            const role = document.getElementById('new-user-role').value;
            
            if (mobile.length !== 10) return alert("10 Digit Mobile Needed!");
            
            let users = getStore('fib_users');
            if(users.some(u => u.mobile === mobile)) return alert("Number already exists!");

            users.push({ name, mobile, role });
            setStore('fib_users', users);
            alert("User Registered Successfully!");
            
            document.getElementById('new-user-name').value = '';
            document.getElementById('new-user-mobile').value = '';
            loadUsers();
        }

        function loadUsers() {
            const list = document.getElementById('users-list');
            const users = getStore('fib_users');
            list.innerHTML = users.map((u, i) => `
                <div class="flex justify-between items-center bg-white p-3 rounded border">
                    <div>
                        <p class="font-bold text-sm text-slate-800">${u.name} <span class="text-[10px] bg-slate-100 px-1 rounded ml-1 text-slate-500 uppercase">${u.role}</span></p>
                        <p class="text-xs text-slate-500">+91 ${u.mobile}</p>
                    </div>
                    <button onclick="delUser(${i})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('') || '<p class="text-xs text-gray-400 italic">No users created yet.</p>';
        }

        function delUser(idx) {
            let u = getStore('fib_users');
            u.splice(idx, 1);
            setStore('fib_users', u);
            loadUsers();
        }

        // Task Engine (Assign & Photo attachment)
        function loadAssignDrop() {
            const users = getStore('fib_users');
            const sel = document.getElementById('task-user');
            sel.innerHTML = users.map(u => `<option value="${u.mobile}">${u.name} (${u.role})</option>`).join('') || '<option value="">Create User First</option>';
        }

        function encodeTaskPhoto(el) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('task-photo-base64').value = e.target.result;
                document.getElementById('task-photo-msg').classList.remove('hidden');
            };
            if(el.files[0]) reader.readAsDataURL(el.files[0]);
        }

        function saveTask() {
            const mobile = document.getElementById('task-user').value;
            const cName = document.getElementById('task-cust-name').value;
            const cMobile = document.getElementById('task-cust-mobile').value;
            const details = document.getElementById('task-details').value;
            const photo = document.getElementById('task-photo-base64').value;

            if(!mobile || !details) return alert("Select User and write details!");

            const tasks = getStore('fib_tasks');
            tasks.push({ engMobile: mobile, cName, cMobile, details, photo, status: 'Pending', date: new Date().toLocaleDateString() });
            setStore('fib_tasks', tasks);
            
            alert("Task Dispatched!");
            // Reset
            ['task-cust-name', 'task-cust-mobile', 'task-details', 'task-photo-base64'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('task-photo-msg').classList.add('hidden');
            switchTab('home');
        }

        // Engineer Task View (Direct Call/WhatsApp Integration)
        function loadMyTasks() {
            const tasks = getStore('fib_tasks');
            // Admin sees all, Engineer sees only theirs
            let myTasks = currentUser.role === 'admin' ? tasks : tasks.filter(t => t.engMobile === currentUser.mobile);

            const list = document.getElementById('mytasks-list');
            list.innerHTML = myTasks.map((t, idx) => `
                <div class="bg-white p-4 border rounded-xl shadow-sm relative space-y-2">
                    <span class="absolute top-2 right-2 text-[9px] px-2 py-1 rounded font-bold ${t.status==='Pending'?'bg-amber-100 text-amber-700':'bg-emerald-100 text-emerald-700'}">${t.status}</span>
                    <h4 class="font-bold text-sm text-slate-800">${t.cName || 'Unnamed Site'}</h4>
                    <p class="text-xs text-slate-600 bg-slate-50 p-2 rounded">${t.details}</p>
                    
                    <div class="flex space-x-2 pt-2 border-t mt-2">
                        ${t.cMobile ? `
                            <a href="tel:${t.cMobile}" class="flex-1 bg-green-500 text-white text-center py-2 rounded-lg text-xs font-bold hover:bg-green-600"><i class="fa-solid fa-phone mr-1"></i> Call</a>
                            <a href="https://wa.me/91${t.cMobile}" target="_blank" class="flex-1 bg-emerald-500 text-white text-center py-2 rounded-lg text-xs font-bold hover:bg-emerald-600"><i class="fa-brands fa-whatsapp mr-1"></i> Msg</a>
                        ` : ''}
                        ${t.photo ? `<button onclick="viewDoc('${t.photo}')" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg text-xs font-bold"><i class="fa-solid fa-image"></i></button>` : ''}
                    </div>
                </div>
            `).join('') || '<p class="text-center text-slate-400 italic text-sm mt-5">No Tasks Assigned.</p>';
        }

        // Base Data Saving (Manual typing logic integration)
        function encodeBase64(el, targetId) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById(targetId).value = e.target.result;
                document.getElementById('ins-upload-msg').classList.remove('hidden');
            };
            if(el.files[0]) reader.readAsDataURL(el.files[0]);
        }

        function saveData(type) {
            let key = '';
            let payload = { date: new Date().toLocaleDateString() };

            if(type === 'install') {
                key = 'fib_installs';
                payload = {...payload, 
                    isp: document.getElementById('ins-isp').value,
                    order: document.getElementById('ins-order-id').value,
                    cust: document.getElementById('ins-customer').value,
                    address: document.getElementById('ins-address').value,
                    photo: document.getElementById('ins-photo').value,
                    pdf: document.getElementById('ins-pdf').value
                };
            } else if (type === 'sr') {
                key = 'fib_srs';
                payload = {...payload,
                    fault: document.getElementById('sr-fault').value,
                    ticket: document.getElementById('sr-ticket').value,
                    cust: document.getElementById('sr-customer').value,
                    resolve: document.getElementById('sr-resolve').value
                };
            } else {
                key = 'fib_restores';
                payload = {...payload,
                    id: document.getElementById('rest-id').value,
                    power: document.getElementById('rest-power').value,
                    remark: document.getElementById('rest-remarks').value
                };
            }

            const dataArr = getStore(key);
            dataArr.push(payload);
            setStore(key, dataArr);
            
            alert("Record Saved Securely!");
            
            // Clear inputs dynamically
            document.querySelectorAll(`#tab-${type} input[type="text"], #tab-${type} textarea, #tab-${type} input[type="hidden"]`).forEach(el => el.value = '');
            if(type === 'install') document.getElementById('ins-upload-msg').classList.add('hidden');
            
            updateDash();
            switchTab('home');
        }

        function renderLedger() {
            const inst = getStore('fib_installs');
            const sr = getStore('fib_srs');
            const target = document.getElementById('ledger-content');

            target.innerHTML = `
                <h4 class="font-bold text-blue-600 bg-blue-50 p-2 rounded mb-1">Installations</h4>
                ${inst.map(i => `<div class="p-2 border-b"><span class="font-bold">${i.isp}</span> - ${i.cust} (${i.date}) ${i.photo?`<a href="#" onclick="viewDoc('${i.photo}')" class="text-blue-500">📷</a>`:''}</div>`).join('') || '<p>No data</p>'}
                
                <h4 class="font-bold text-red-600 bg-red-50 p-2 rounded mb-1 mt-4">SR Logs</h4>
                ${sr.map(s => `<div class="p-2 border-b"><span class="font-bold text-red-500">${s.fault}</span> - ${s.cust} (${s.date})</div>`).join('') || '<p>No data</p>'}
            `;
        }

        function viewDoc(data) {
            const w = window.open();
            w.document.write(`<img src="${data}" style="max-width:100%; display:block; margin:auto;"/>`);
        }

        function resetData() {
            if(confirm("Are you sure? This deletes ALL data except Users.")) {
                localStorage.removeItem('fib_installs');
                localStorage.removeItem('fib_srs');
                localStorage.removeItem('fib_restores');
                localStorage.removeItem('fib_tasks');
                updateDash();
                switchTab('home');
            }
        }
    </script>
</body>
</html>
