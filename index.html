            const container = document.getElementById('reset-trigger-container');
            if (role === 'Admin') {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        // Operational Authentication Business Logics Processing Loop Rules
        function handleLogin() {
            const role = document.getElementById('login-role').value;
            const mobile = document.getElementById('login-mobile').value.trim();
            const pin = document.getElementById('login-password').value;

            if (mobile.length !== 10 || isNaN(mobile)) {
                alert("🚨 Validation Error: system requires a clean, valid 10-digit mobile identification number sequence.");
                return;
            }
            if (!pin) {
                alert("🚨 Configuration missing: Verification Password / Security PIN matrix data slot empty.");
                return;
            }

            // Database Search Match Engine Query
            const accountMatch = state.users.find(u => u.mobile === mobile && u.role === role && u.pin === pin);

            if (accountMatch) {
                state.currentUser = accountMatch;
                localStorage.setItem('fwm_session', JSON.stringify(accountMatch));
                bootApplicationUI();
                alert(`✨ Access Granted! Node terminal established for ${accountMatch.name} (${accountMatch.role}).`);
            } else {
                alert("❌ Authentication Failure: Provided mobile payload coordinates match no records inside security perimeter schemas.");
            }
        }

        function handleRegister() {
            const role = document.getElementById('reg-role').value;
            const name = document.getElementById('reg-name').value.trim();
            const mobile = document.getElementById('reg-mobile').value.trim();
            const pin = document.getElementById('reg-password').value;

            if (!name || mobile.length !== 10 || !pin) {
                alert("🚨 Missing payload metadata: Make sure all input parameters fields are fully populated.");
                return;
            }

            // Verify white-listed system entry credentials inside control registry framework
            const isAuthorized = state.whitelist.some(w => w.mobile === mobile && w.role === role);
            if (!isAuthorized) {
                alert("⛔ Authorization Exception Rejected: This terminal contact framework number is absent from administrative pre-approval ledger arrays.");
                return;
            }

            // Check if user already exists
            const existingUser = state.users.some(u => u.mobile === mobile && u.role === role);
            if (existingUser) {
                alert("🛡️ Security Exception: Account registration node signature already alive on this pipeline tracking array.");
                return;
            }

            // Register account node mapping layout elements sequence arrays
            const newWorker = { mobile, name, role, pin };
            state.users.push(newWorker);
            localStorage.setItem('fwm_users', JSON.stringify(state.users));

            alert(`✅ Account Registry Confirmed! Switch to login interface panel layout node parameters for accessing secure session tracking.`);
            toggleAuthForm('login');
            document.getElementById('login-mobile').value = mobile;
            updateStaffCounters();
        }

        function triggerMasterReset() {
            if (confirm("⚠️ System override sequence verification requested: Do you wish to reset the Master Admin Password database mapping layout configuration?")) {

                    return u;

                localStorage.setItem('fwm_users', JSON.stringify(state.users));
                alert("🔄 Baseline Master Security Matrix reset back to factory standard parameter coordinates config: PIN -> 1234");

        // Auto GPS Tracking Logic Engine & Distance Calculations (Haversine Formula Implementation)
        function triggerPunchIn() {
            if (!navigator.geolocation) {
                // Device interface failure logic fallback handler loop
                alert("💻 Geolocation Engine hardware API missing from this terminal interface framework environment. Initiating high-fidelity route coordinate simulation matrix mapping loop sequence...");
                executeMockLocationIntervalEngine();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    processTrackingDataPayload(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    console.warn("⚠️ Device Native GPS hardware channel error parameters block context, utilizing automated route simulation path engine tracking array calculations.");
                    executeMockLocationIntervalEngine();
                },
                { enableHighAccuracy: true, timeout: 6000 }
            );
        }

        function executeMockLocationIntervalEngine() {
            state.tracking.isPunchedIn = !state.tracking.isPunchedIn;
            
            if (state.tracking.isPunchedIn) {
                // Punch in sequence context array setup logic processing triggers
                const activeIndex = state.tracking.currentSiteIndex % SIM_SITES.length;
                const nextSite = SIM_SITES[activeIndex];
                
                if (state.tracking.lastLat && state.tracking.lastLng) {
                    const computedDistanceDelta = computeHaversineDistanceKm(state.tracking.lastLat, state.tracking.lastLng, nextSite.lat, nextSite.lng);
                    state.tracking.totalDistance += computedDistanceDelta;
                }

                state.tracking.lastLat = nextSite.lat;
                state.tracking.lastLng = nextSite.lng;
                state.tracking.currentSiteIndex++;
                
                localStorage.setItem('fwm_tracking', JSON.stringify(state.tracking));
                alert(`🚀 Punched In and Authenticated at location node point [${nextSite.name}]. Travel distance delta accrued to workspace analytics matrices tracking loop schemas!`);
            } else {
                alert("🏁 Terminated active work site operation routing. Device terminal status flipped back into standby IDLE.");
            }

            renderTravelEngineState();
        }

        function processTrackingDataPayload(lat, lng) {
            state.tracking.isPunchedIn = !state.tracking.isPunchedIn;

            if (state.tracking.isPunchedIn) {
                if (state.tracking.lastLat && state.tracking.lastLng) {
                    const distanceAccumulateDelta = computeHaversineDistanceKm(state.tracking.lastLat, state.tracking.lastLng, lat, lng);
                    state.tracking.totalDistance += distanceAccumulateDelta;
                }
                state.tracking.lastLat = lat;
                state.tracking.lastLng = lng;
                localStorage.setItem('fwm_tracking', JSON.stringify(state.tracking));
                alert("🚀 Dynamic Live GPS Location Node telemetry acquired! Active tracking array coordinates established on terminal.");
            } else {
                alert("🏁 Station tracking context decoupled. Node terminal tracking logged out safely to memory buffer arrays map.");
            }

            renderTravelEngineState();
        }

        function renderTravelEngineState() {
            const statusBadge = document.getElementById('travel-status-badge');
            const distanceCounter = document.getElementById('count-travel');
            const buttonContainer = document.getElementById('punch-btn-container');
            const logInfo = document.getElementById('gps-log-info');

            distanceCounter.innerText = `${state.tracking.totalDistance.toFixed(2)} KM`;

            if (state.tracking.isPunchedIn) {
                statusBadge.innerText = "ACTIVE ON SITE";
                statusBadge.className = "bg-emerald-500 text-white text-[10px] font-black px-2 py-0.5 rounded-sm animate-pulse shadow-xs";
                buttonContainer.innerHTML = `
                    <button onclick="triggerPunchIn()" class="bg-red-500 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow hover:bg-red-600 transition">
                        <i class="fa-solid fa-circle-stop mr-1"></i> Punch Out Station
                    </button>`;
                logInfo.innerText = `Connected Node Latitude: ${state.tracking.lastLat ? state.tracking.lastLat.toFixed(4) : "Simulated Lat Matrix Axis"} | Longitude: ${state.tracking.lastLng ? state.tracking.lastLng.toFixed(4) : "Simulated Lng Matrix Axis"}`;
                logInfo.className = "text-[10px] text-emerald-600 font-bold text-center tracking-wide";
            } else {
                statusBadge.innerText = "IDLE";
                statusBadge.className = "bg-gray-100 text-gray-600 text-[10px] font-black px-2 py-0.5 rounded-sm";
                buttonContainer.innerHTML = `
                    <button onclick="triggerPunchIn()" class="bg-blue-600 text-white font-bold text-xs px-4 py-2.5 rounded-xl shadow hover:bg-blue-700 transition">
                        <i class="fa-solid fa-location-crosshairs mr-1"></i> Punch In Site ${String.fromCharCode(65 + (state.tracking.currentSiteIndex % 26))}
                    </button>`;
                logInfo.innerText = "Ready for next site navigation...";
                logInfo.className = "text-[10px] text-gray-400 italic font-medium text-center";
            }
        }

        // Mathematical Computation Pipeline Functions
        function computeHaversineDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's mean radius standard measurement scale parameter constant parameters variable definitions mapping
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // UI Statistics Metrics Synchronization Elements Updates Processing Block Loop
        function refreshGlobalCounters() {
            const countInstallEl = document.getElementById('count-install');
            const countSrEl = document.getElementById('count-sr');

            const installCount = state.logs.filter(l => l.type === 'INSTALL').length;
            const srCount = state.logs.filter(l => l.type === 'SR').length;

            if (countInstallEl) countInstallEl.innerText = installCount;
            if (countSrEl) countSrEl.innerText = srCount;
            updateStaffCounters();
        }

        function updateStaffCounters() {
            const adminCount = state.users.filter(u => u.role === 'Admin').length;
            const engCount = state.users.filter(u => u.role === 'Engineer').length;
            const helpCount = state.users.filter(u => u.role === 'Helper').length;

            document.getElementById('staff-count-admin').innerText = adminCount;
            document.getElementById('staff-count-engineer').innerText = engCount;
            document.getElementById('staff-count-helper').innerText = helpCount;
        }

        // Administration Tab Functional Operations Processing Layout Core Logics Loops
        function renderAdminWhitelistLedger() {
            const container = document.getElementById('whitelist-render-container');
            if (!container) return;
            container.innerHTML = "";

            state.whitelist.forEach(item => {
                const rowHtml = `
                    <div class="flex justify-between items-center text-xs bg-white p-2 border border-gray-100 rounded-md shadow-xs mb-1">
                        <span class="font-bold text-gray-700 tracking-wide">+91 ${item.mobile}</span>
                        <div class="flex items-center space-x-2">
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full border ${item.role === 'Admin' ? 'bg-amber-50 text-amber-600 border-amber-200' : item.role === 'Engineer' ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-emerald-50 text-emerald-600 border-emerald-200'}">${item.role}</span>
                            ${item.mobile !== "9142173747" ? `<button onclick="removeMobileFromWhitelist('${item.mobile}')" class="text-red-500 hover:text-red-700 font-semibold text-[11px]"><i class="fa-regular fa-trash-can"></i></button>` : ''}
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', rowHtml);
            });
        }

        function addMobileToWhitelist() {
            const mobile = document.getElementById('admin-whitelist-mobile').value.trim();
            const role = document.getElementById('admin-whitelist-role').value;

            if (mobile.length !== 10 || isNaN(mobile)) {
                alert("🚨 Operation Aborted: Target validation parameter configuration must match exactly a 10-digit telephone matrix array stream.");
                return;
            }

            const alreadyPresent = state.whitelist.some(w => w.mobile === mobile);
            if (alreadyPresent) {
                alert("📝 Contact payload data node already mapped to access whitelist security clearance configuration profiles.");
                return;
            }

            state.whitelist.push({ mobile, role });
            localStorage.setItem('fwm_whitelist', JSON.stringify(state.whitelist));
            document.getElementById('admin-whitelist-mobile').value = "";
            renderAdminWhitelistLedger();
            alert("🎯 Successfully Authorized! New staff coordinate number added to whitelist system blueprint arrays mapping layout.");
        }

        function removeMobileFromWhitelist(mobileNumber) {
            if (confirm("⚠️ System modification warning: Block authentication routes and delete this mobile tracking registry target clearance item node?")) {
                state.whitelist = state.whitelist.filter(w => w.mobile !== mobileNumber);
                localStorage.setItem('fwm_whitelist', JSON.stringify(state.whitelist));
                renderAdminWhitelistLedger();
            }
        }

        function exportDataString() {
            const dumpDataString = btoa(unescape(encodeURIComponent(JSON.stringify({ logs: state.logs, whitelist: state.whitelist, users: state.users }))));
            navigator.clipboard.writeText(dumpDataString).then(() => {
                alert("📋 System encrypted database state payload snapshot strings dump array data successfully copied straight to operating system context clipboard storage buffers arrays!");
            }).catch(err => {
                alert("Data Dump String Output Payload Array: \n\n" + dumpDataString);
            });
        }

        function triggerSystemPurge() {
            if (confirm("💥 CRITICAL ACTION WARNING: This will permanently wipe out all current localized installation transactions logs databases matrices, travel track history configuration parameters and operational states caches! Proceed?")) {
                localStorage.clear();
                alert("🔄 Local storage systems memory completely purged clean. Reloading app context environments baseline configurations...");
                window.location.reload();
            }
        }
    </script>
