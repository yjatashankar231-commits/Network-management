<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberPro Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <div id="auth-screen" class="fixed inset-0 bg-blue-900 z-50 flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-8 rounded-3xl shadow-2xl text-center">
            <h1 class="text-xl font-bold text-blue-900 mb-6">FiberPro Admin/Staff</h1>
            <input id="login-mobile" type="tel" placeholder="Mobile Number" class="w-full p-3 mb-4 rounded-xl border border-gray-200 outline-none">
            <input id="login-pass" type="password" placeholder="Password/PIN" class="w-full p-3 mb-6 rounded-xl border border-gray-200 outline-none">
            <button onclick="auth()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold hover:bg-blue-700">LOGIN / ACCESS</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-white p-4 shadow-sm border-b sticky top-0 flex justify-between items-center">
            <h2 class="font-black text-blue-900">FiberPro</h2>
            <button onclick="resetAdminPin()" class="text-[10px] bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold">Change PIN</button>
        </nav>

        <main class="p-4 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-blue-600 text-white p-4 rounded-2xl">
                    <p class="text-[10px] opacity-80">Tasks Productivity</p>
                    <h3 id="stat-tasks" class="text-2xl font-black">0</h3>
                </div>
                <button onclick="exportData()" class="bg-emerald-600 text-white p-4 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-file-export mr-2"></i> Export Excel
                </button>
            </div>

            <div class="bg-white p-5 rounded-3xl border shadow-sm">
                <h3 class="font-bold text-sm mb-3">Assign Task to Employee</h3>
                <input id="t-name" placeholder="Employee Name" class="w-full p-2 mb-2 bg-gray-50 rounded-lg outline-none">
                <input id="t-work" placeholder="Task Details" class="w-full p-2 mb-2 bg-gray-50 rounded-lg outline-none">
                <button onclick="addTask()" class="w-full bg-indigo-600 text-white py-2 rounded-xl text-sm font-bold">ASSIGN TASK</button>
            </div>

            <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                <table class="w-full text-left text-xs">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-3">Staff</th>
                            <th class="p-3">Task</th>
                            <th class="p-3">Date</th>
                        </tr>
                    </thead>
                    <tbody id="data-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // Password Management
        function resetAdminPin() {
            let p = prompt("Set New Admin PIN:");
            if(p) { localStorage.setItem('admin_pin', p); alert("PIN Updated!"); }
        }

        // Logic
        function auth() {
            const m = document.getElementById('login-mobile').value;
            const p = document.getElementById('login-pass').value;
            // Simplified check
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadData();
        }

        function addTask() {
            let n = document.getElementById('t-name').value;
            let w = document.getElementById('t-work').value;
            let list = JSON.parse(localStorage.getItem('f_tasks') || '[]');
            list.push({n, w, d: new Date().toLocaleDateString()});
            localStorage.setItem('f_tasks', JSON.stringify(list));
            loadData();
            alert("Task Assigned & Reminder Sent!");
        }

        function loadData() {
            let list = JSON.parse(localStorage.getItem('f_tasks') || '[]');
            document.getElementById('stat-tasks').innerText = list.length;
            let html = list.map(i => `
                <tr class="border-b">
                    <td class="p-3 font-bold">${i.n}</td>
                    <td class="p-3">${i.w}</td>
                    <td class="p-3 text-gray-400">${i.d}</td>
                </tr>
            `).join('');
            document.getElementById('data-body').innerHTML = html;
        }

        function exportData() {
            let list = JSON.parse(localStorage.getItem('f_tasks') || '[]');
            let csv = "Name,Task,Date\n" + list.map(i => `${i.n},${i.w},${i.d}`).join('\n');
            let blob = new Blob([csv], {type: 'text/csv'});
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url; a.download = "Report.csv"; a.click();
        }
    </script>
</body>
</html>
