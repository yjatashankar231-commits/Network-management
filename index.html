<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiber Work Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-blue-50 text-gray-800 min-h-screen flex flex-col pb-16 md:pb-0">

    <header class="bg-gradient-to-r from-blue-600 to-blue-500 text-white px-6 py-4 flex flex-col sm:flex-row justify-between items-center shadow-md">
        <div class="flex items-center space-x-3 mb-3 sm:mb-0">
            <div class="bg-white/20 p-2 rounded-full text-2xl">
                <i class="fa-solid fa-satellite-dish text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wide">Fiber Work Manager</h1>
                <p class="text-xs text-blue-100">Professional Field Engineer App</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div class="bg-white/20 px-4 py-1.5 rounded-full text-sm flex items-center space-x-2">
                <i class="fa-regular fa-calendar"></i>
                <span id="current-date"></span>
            </div>
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-white text-blue-600 font-bold rounded-full flex items-center justify-center text-lg border-2 border-white shadow">
                    E
                </div>
                <div class="hidden sm:block text-left">
                    <p class="text-sm font-semibold leading-tight">Engineer</p>
                    <p class="text-xs text-blue-100">Field Engineer</p>
                </div>
            </div>
        </div>
    </header>

    <div class="flex flex-1">
        <!-- Sidebar for Desktop -->
        <aside class="w-64 bg-white border-r border-gray-200 p-4 hidden md:flex flex-col justify-between shrink-0">
            <div>
                <p class="text-xs font-bold text-blue-600 tracking-wider uppercase mb-3">Main Menu</p>
                <nav class="space-y-1 mb-6">
                    <a href="index.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg bg-blue-50 text-blue-600 font-medium transition">
                        <i class="fa-solid fa-house w-5"></i> <span>Dashboard</span>
                    </a>
                    <a href="installation.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition">
                        <i class="fa-solid fa-screwdriver-wrench w-5"></i>
                        <span>Installation</span>
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-6 space-y-6 overflow-y-auto max-w-6xl mx-auto w-full">
            
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between">
                    <div class="bg-blue-50 w-10 h-10 rounded-lg flex items-center justify-center text-blue-600 mb-3 shadow-inner">
                        <i class="fa-solid fa-box-archive text-lg"></i>
                    </div>
                    <div>
                        <h3 id="installationCount" class="text-3xl font-extrabold text-gray-900 leading-tight">0</h3>
                        <p class="text-sm font-semibold text-gray-800 mt-0.5">Installation</p>
                        <p class="text-xs text-gray-400 mt-0.5">Today</p>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between">
                    <div class="bg-emerald-50 w-10 h-10 rounded-lg flex items-center justify-center text-emerald-600 mb-3 shadow-inner">
                        <i class="fa-solid fa-phone text-lg"></i>
                    </div>
                    <div>
                        <h3 id="srCount" class="text-3xl font-extrabold text-gray-900 leading-tight">0</h3>
                        <p class="text-sm font-semibold text-gray-800 mt-0.5">SR</p>
                        <p class="text-xs text-gray-400 mt-0.5">Today</p>
                    </div>
                </div>
            </div>

            <!-- Shortcuts for Mobile -->
            <div>
                <h2 class="text-xs font-bold text-blue-600 tracking-wider uppercase mb-3">Quick Shortcuts</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.location.href='installation.html'" class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition text-center flex flex-col items-center justify-center cursor-pointer group">
                        <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center mb-2 group-hover:scale-105 transition shadow-sm border border-blue-100">
                            <i class="fa-solid fa-screwdriver-wrench text-lg"></i>
                        </div>
                        <span class="text-xs font-bold text-gray-700">Add Installation</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Bottom Navigation for Mobile -->
    <div class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around py-2 shadow-lg z-50">
        <a href="index.html" class="flex flex-col items-center text-blue-600">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] font-bold">Home</span>
        </a>
        <a href="installation.html" class="flex flex-col items-center text-gray-500 hover:text-blue-600">
            <i class="fa-solid fa-screwdriver-wrench text-lg"></i>
            <span class="text-[10px] font-bold">Install</span>
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
