<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranext Fiber Work Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; }
        .page-tab { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page-tab.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #auth-screen { display: flex; }
        #app-content { display: none; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-24">

    <div id="auth-screen" class="fixed inset-0 bg-gradient-to-br from-blue-700 to-slate-900 z-[9999] flex flex-col justify-center items-center p-6">
        <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-2xl text-center space-y-5">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto shadow-inner border border-blue-100">
                <i class="fa-solid fa-network-wired"></i>
            </div>
            <div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Work Manager</h2>
                <p class="text-xs text-slate-400 font-medium">Ahmedabad Zone Operations</p>
            </div>
            
            <div id="form-login" class="auth-form active space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Mobile Number</label>
                    <input id="login-mobile" type="tel" maxlength="10" placeholder="10 Digit Number" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-semibold bg-slate-50">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">PIN / Password</label>
                    <input id="login-password" type="password" placeholder="Enter PIN" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold rounded-xl p-3.5 hover:bg-blue-700 shadow-lg transition active:scale-95 flex justify-center items-center gap-2">
                    Access Portal <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="app-content" class="flex-col min-h-screen w-full hidden">

        <header class="bg-gradient-to-r from-blue-700 to-blue-600 text-white px-5 py-4 flex justify-between items-center shadow-md sticky top-0 z-50">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="switchTab('home')">
                <div class="bg-white/20 p-2 rounded-lg text-xl backdrop-blur-sm"><i class="fa-solid fa-satellite-dish"></i></div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">Work Manager</h1>
                    <p class="text-[10px] text-blue-100 font-medium tracking-wide">Owner: Jatashankar Yadav</p>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-red-500/80 hover:bg-red-500 text-white p-2 rounded-lg text-sm shadow transition backdrop-blur-sm">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </header>

        <main class="flex-1 max-w-md mx-auto w-full p-4 overflow-y-auto custom-scrollbar space-y-4">

            <div id="tab-home" class="page-tab active space-y-5">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Installations</p>
                            <h3 id="dash-install-count" class="text-2xl font-black text-blue-600 mt-1">0</h3>
                        </div>
                        <div class="h-10 w-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-lg"><i class="fa-solid fa-server"></i></div>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">SR Logs</p>
                            <h3 id="dash-sr-count" class="text-2xl font-black text-red-500 mt-1">0</h3>
                        </div>
                        <div class="h-10 w-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-lg"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    </div>
                </div>

                <div class="space-y-3">
                    <h2 class="text-xs font-black text-slate-400 tracking-widest uppercase pl-1">Installation Workflows</h2>
                    
                    <button onclick="switchTab('install-receive')" class="w-full bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between hover:border-blue-300 transition group">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center text-xl group-hover:scale-110 transition"><i class="fa-solid fa-file-import"></i></div>
                            <div class="text-left">
                                <h4 class="font-bold text-slate-800 text-sm">1. Order Received</h4>
                                <p class="text-[10px] text-slate-500">Log new customer installation entry</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                    </button>

                    <button onclick="switchTab('install-complete')" class="w-full bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between hover:border-emerald-300 transition group">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-xl group-hover:scale-110 transition"><i class="fa-solid fa-check-double"></i></div>
                            <div class="text-left">
                                <h4 class="font-bold text-slate-800 text-sm">2. Installation Complete</h4>
                                <p class="text-[10px] text-slate-500">Upload photos & hardware details</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                    </button>

                    <h2 class="text-xs font-black text-slate-400 tracking-widest uppercase pl-1 pt-2">Service Request (SR) Workflows</h2>

                    <button onclick="switchTab('sr-receive')" class="w-full bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between hover:border-amber-300 transition group">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-xl flex items-center justify-center text-xl group-hover:scale-110 transition"><i class="fa-solid fa-headset"></i></div>
                            <div class="text-left">
                                <h4 class="font-bold text-slate-800 text-sm">3. SR Received</h4>
                                <p class="text-[10px] text-slate-500">Log new fault / LOS complaint</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                    </button>

                    <button onclick="switchTab('sr-resolve')" class="w-full bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between hover:border-blue-300 transition group">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center text-xl group-hover:scale-110 transition"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                            <div class="text-left">
                                <h4 class="font-bold text-slate-800 text-sm">4. SR Resolved</h4>
                                <p class="text-[10px] text-slate-500">Upload restore proof & Rx power</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                    </button>
                </div>
            </div>

            <div id="tab-install-receive" class="page-tab space-y-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                        <h2 class="font-black text-indigo-700"><i class="fa-solid fa-file-import mr-2"></i>Order Received Form</h2>
                        <button onclick="switchTab('home')" class="text-slate-400 text-sm hover:text-slate-700"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    
                    <div id="form-ir-data" class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">ISP Name</label><input id="ir-isp" type="text" placeholder="e.g. Jio/Airtel" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Order ID</label><input id="ir-order" type="text" placeholder="Order ID" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">City</label><input id="ir-city" type="text" value="Ahmedabad" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Site/Area</label><input id="ir-site" type="text" placeholder="Area" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                        </div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Customer Name</label><input id="ir-name" type="text" placeholder="Full Name" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Mobile Number</label><input id="ir-mobile" type="tel" maxlength="10" placeholder="10 Digit Number" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Full Address</label><textarea id="ir-address" rows="2" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></textarea></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Received Date</label><input id="ir-date" type="date" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">IPTV Require</label>
                                <select id="ir-iptv" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"><option>NO</option><option>YES</option></select>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-5">
                        <button onclick="saveLogData('Install_Receive')" class="col-span-2 bg-indigo-600 text-white font-bold p-3 rounded-xl hover:bg-indigo-700 shadow-md"><i class="fa-solid fa-floppy-disk mr-1"></i> Save to Database</button>
                        <button onclick="shareWhatsApp('ir')" class="bg-green-500 text-white font-bold p-2.5 rounded-xl text-xs"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
                        <button onclick="downloadPDF('form-ir-data', 'Order_Received')" class="bg-red-500 text-white font-bold p-2.5 rounded-xl text-xs"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                    </div>
                </div>
            </div>

            <div id="tab-install-complete" class="page-tab space-y-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                        <h2 class="font-black text-emerald-700"><i class="fa-solid fa-check-double mr-2"></i>Installation Complete</h2>
                        <button onclick="switchTab('home')" class="text-slate-400 text-sm hover:text-slate-700"><i class="fa-solid fa-xmark"></i></button>
                    </div>

                    <div id="form-ic-data" class="space-y-3">
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Link Order ID</label><input id="ic-order" type="text" placeholder="Enter Order ID" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 font-black text-emerald-700 border-emerald-200"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Completion Date</label><input id="ic-date" type="date" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Fiber Length (Mtr)</label><input id="ic-length" type="number" placeholder="e.g. 150" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Fatbox / Port No.</label><input id="ic-fatbox" type="text" placeholder="Port Details" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Router Serial/MAC</label><input id="ic-mac" type="text" placeholder="MAC Address" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                        </div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Closing Remarks / Rx Power</label><input id="ic-remark" type="text" placeholder="e.g. Done, Rx -19dBm" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                    </div>

                    <div class="mt-4 p-3 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                        <label class="text-[11px] font-bold text-slate-600 block mb-2"><i class="fa-solid fa-camera text-emerald-500"></i> Upload Installation Photos</label>
                        <input type="file" multiple accept="image/*" onchange="handlePhotoUpload(this, 'ic-gallery')" class="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:font-bold file:bg-emerald-100 file:text-emerald-700 cursor-pointer">
                        <div id="ic-gallery" class="grid grid-cols-4 gap-2 pt-2"></div> </div>

                    <div class="grid grid-cols-2 gap-2 mt-5">
                        <button onclick="saveLogData('Install_Complete')" class="col-span-2 bg-emerald-600 text-white font-bold p-3 rounded-xl hover:bg-emerald-700 shadow-md"><i class="fa-solid fa-floppy-disk mr-1"></i> Save Completion Log</button>
                        <button onclick="shareWhatsApp('ic')" class="bg-green-500 text-white font-bold p-2.5 rounded-xl text-xs"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
                        <button onclick="downloadPDF('form-ic-data', 'Install_Complete')" class="bg-red-500 text-white font-bold p-2.5 rounded-xl text-xs"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                    </div>
                </div>
            </div>

            <div id="tab-sr-receive" class="page-tab space-y-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                        <h2 class="font-black text-amber-600"><i class="fa-solid fa-headset mr-2"></i>SR Complaint Received</h2>
                        <button onclick="switchTab('home')" class="text-slate-400 text-sm hover:text-slate-700"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    
                    <div id="form-srr-data" class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">ISP Name</label><input id="srr-isp" type="text" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">SR Ticket ID</label><input id="srr-ticket" type="text" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                        </div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Customer Name</label><input id="srr-name" type="text" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Mobile Number</label><input id="srr-mobile" type="tel" maxlength="10" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">Issue/Fault Type</label>
                            <select id="srr-issue" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 text-red-600 font-bold">
                                <option>LOS Red / Cable Cut</option><option>Slow Speed</option><option>Router Dead / No Power</option><option>Shifting Request</option>
                            </select>
                        </div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Address / Site</label><textarea id="srr-address" rows="2" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></textarea></div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-5">
                        <button onclick="saveLogData('SR_Receive')" class="col-span-2 bg-amber-500 text-white font-bold p-3 rounded-xl hover:bg-amber-600 shadow-md"><i class="fa-solid fa-floppy-disk mr-1"></i> Save SR Entry</button>
                        <button onclick="shareWhatsApp('srr')" class="col-span-2 bg-green-500 text-white font-bold p-2.5 rounded-xl text-sm"><i class="fa-brands fa-whatsapp"></i> Share details to Field Boy</button>
                    </div>
                </div>
            </div>

            <div id="tab-sr-resolve" class="page-tab space-y-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4 pb-3 border-b border-slate-100">
                        <h2 class="font-black text-blue-600"><i class="fa-solid fa-screwdriver-wrench mr-2"></i>SR Resolved Log</h2>
                        <button onclick="switchTab('home')" class="text-slate-400 text-sm hover:text-slate-700"><i class="fa-solid fa-xmark"></i></button>
                    </div>

                    <div id="form-srd-data" class="space-y-3">
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">SR Ticket ID</label><input id="srd-ticket" type="text" placeholder="Enter Ticket ID" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 font-black text-blue-700 border-blue-200"></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Resolution Time</label><input id="srd-time" type="time" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></div>
                            <div><label class="text-[10px] font-bold text-slate-500 uppercase">Final Rx Power</label><input id="srd-power" type="text" placeholder="e.g. -21dBm" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 text-emerald-600 font-bold"></div>
                        </div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Action Taken / Remarks</label><textarea id="srd-action" rows="2" placeholder="Splicing done, patch cord changed..." class="w-full border rounded-lg p-2.5 text-sm bg-slate-50"></textarea></div>
                    </div>

                    <div class="mt-4 p-3 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                        <label class="text-[11px] font-bold text-slate-600 block mb-2"><i class="fa-solid fa-camera text-blue-500"></i> Upload Restore Photos</label>
                        <input type="file" multiple accept="image/*" onchange="handlePhotoUpload(this, 'srd-gallery')" class="w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:font-bold file:bg-blue-100 file:text-blue-700 cursor-pointer">
                        <div id="srd-gallery" class="grid grid-cols-4 gap-2 pt-2"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-5">
                        <button onclick="saveLogData('SR_Resolved')" class="col-span-2 bg-blue-600 text-white font-bold p-3 rounded-xl hover:bg-blue-700 shadow-md"><i class="fa-solid fa-floppy-disk mr-1"></i> Save Resolution Log</button>
                        <button onclick="shareWhatsApp('srd')" class="bg-green-500 text-white font-bold p-2.5 rounded-xl text-xs"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
                        <button onclick="downloadPDF('form-srd-data', 'SR_Resolved')" class="bg-red-500 text-white font-bold p-2.5 rounded-xl text-xs"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                    </div>
                </div>
            </div>

            <div id="tab-data" class="page-tab space-y-4">
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm space-y-3 min-h-[70vh]">
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                        <h3 class="font-black text-slate-800"><i class="fa-solid fa-database text-blue-500 mr-2"></i>Database Logs</h3>
                        <div class="flex gap-2">
                            <button onclick="exportExcel()" class="bg-emerald-100 text-emerald-700 hover:bg-emerald-600 hover:text-white font-bold text-[10px] px-3 py-1.5 rounded-lg transition">
                                <i class="fa-solid fa-file-excel mr-1"></i> Excel
                            </button>
                        </div>
                    </div>
                    <div id="database-list" class="space-y-3 overflow-y-auto">
                        </div>
                </div>
            </div>

        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-6 py-3 flex justify-around items-center shadow-[0_-4px_15px_-10px_rgba(0,0,0,0.1)] z-50 max-w-md mx-auto rounded-t-2xl">
            <button onclick="switchTab('home')" class="nav-btn flex flex-col items-center space-y-1 text-blue-600 font-bold">
                <i class="fa-solid fa-house text-lg"></i><span class="text-[9px]">Home</span>
            </button>
            <button onclick="switchTab('data'); loadDatabaseLogs();" class="nav-btn flex flex-col items-center space-y-1 text-slate-400 hover:text-blue-500">
                <i class="fa-solid fa-server text-lg"></i><span class="text-[9px]">All Logs</span>
            </button>
        </nav>
    </div>

    <script>
        // Set today's date automatically in date fields
        document.getElementById('ir-date').valueAsDate = new Date();
        document.getElementById('ic-date').valueAsDate = new Date();

        let temporaryPhotos = [];

        // Auth Logic
        function handleLogin() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            updateDashboardCounters();
        }

        // Tab Switcher
        function switchTab(tabId) {
            document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            // Clear temp photos when switching tabs
            temporaryPhotos = [];
            document.getElementById('ic-gallery').innerHTML = '';
            document.getElementById('srd-gallery').innerHTML = '';
            
            if(tabId === 'home') updateDashboardCounters();
        }

        // --- Photo Handling (Base64) & Preview with Download ---
        function handlePhotoUpload(inputElement, galleryId) {
            const files = inputElement.files;
            if (!files) return;
            const gallery = document.getElementById(galleryId);
            
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const baseData = e.target.result;
                    temporaryPhotos.push(baseData);
                    
                    const div = document.createElement('div');
                    div.className = "relative group aspect-square rounded-lg bg-cover bg-center border border-slate-200 overflow-hidden shadow-sm";
                    div.style.backgroundImage = `url('${baseData}')`;
                    
                    // Create direct download button over photo
                    div.innerHTML = `
                        <a href="${baseData}" download="Site_Proof_${Date.now()}.jpg" class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition duration-200 text-white cursor-pointer text-[10px] font-bold">
                            <i class="fa-solid fa-download text-lg mb-1"></i> Save
                        </a>`;
                    gallery.appendChild(div);
                }
                reader.readAsDataURL(files[i]);
            }
        }

        // --- Core Database Engine (Local Storage) ---
        function getDB() {
            return JSON.parse(localStorage.getItem('FiberWorkDB') || '[]');
        }
        function saveDB(data) {
            localStorage.setItem('FiberWorkDB', JSON.stringify(data));
        }
        
        function updateDashboardCounters() {
            const db = getDB();
            document.getElementById('dash-install-count').innerText = db.filter(d => d.type.includes('Install')).length;
            document.getElementById('dash-sr-count').innerText = db.filter(d => d.type.includes('SR')).length;
        }

        function saveLogData(formType) {
            const db = getDB();
            let entry = { id: Date.now(), type: formType, timestamp: new Date().toLocaleString() };

            if (formType === 'Install_Receive') {
                entry.order = document.getElementById('ir-order').value;
                entry.name = document.getElementById('ir-name').value;
                entry.address = document.getElementById('ir-city').value + ', ' + document.getElementById('ir-site').value + ' - ' + document.getElementById('ir-address').value;
                entry.mobile = document.getElementById('ir-mobile').value;
                entry.status = "Pending";
            } else if (formType === 'Install_Complete') {
                entry.order = document.getElementById('ic-order').value;
                entry.mac = document.getElementById('ic-mac').value;
                entry.remark = document.getElementById('ic-remark').value;
                entry.status = "Completed";
                entry.photosCount = temporaryPhotos.length;
            } else if (formType === 'SR_Receive') {
                entry.order = document.getElementById('srr-ticket').value; // mapping ticket to order field for UI consistency
                entry.name = document.getElementById('srr-name').value;
                entry.issue = document.getElementById('srr-issue').value;
                entry.status = "Pending SR";
            } else if (formType === 'SR_Resolved') {
                entry.order = document.getElementById('srd-ticket').value;
                entry.remark = document.getElementById('srd-action').value;
                entry.power = document.getElementById('srd-power').value;
                entry.status = "Resolved";
                entry.photosCount = temporaryPhotos.length;
            }

            if(!entry.order) { alert("Please enter Order/Ticket ID!"); return; }
            
            db.push(entry);
            saveDB(db);
            alert(`${formType.replace('_', ' ')} saved successfully in Local Database!`);
            
            // Clear inputs
            document.querySelectorAll('input[type="text"], input[type="number"], input[type="tel"], textarea').forEach(el => el.value = '');
            switchTab('home');
        }

        // --- Render Database in UI ---
        function loadDatabaseLogs() {
            const db = getDB().reverse(); // Show newest first
            const list = document.getElementById('database-list');
            list.innerHTML = '';
            
            if(db.length === 0) {
                list.innerHTML = `<p class="text-center text-slate-400 text-xs py-10">No records found. Start adding forms.</p>`;
                return;
            }

            db.forEach(item => {
                let color = item.type.includes('Complete') || item.type.includes('Resolved') ? 'text-emerald-600 bg-emerald-50 border-emerald-100' : 
                           (item.type.includes('SR') ? 'text-amber-600 bg-amber-50 border-amber-100' : 'text-indigo-600 bg-indigo-50 border-indigo-100');
                
                list.innerHTML += `
                    <div class="p-3 rounded-xl border ${color} text-xs space-y-1">
                        <div class="flex justify-between items-center font-bold pb-1 mb-1 border-b border-black/5">
                            <span>ID: ${item.order}</span>
                            <span class="text-[9px] uppercase px-2 py-0.5 rounded-full bg-white/50">${item.type.replace('_',' ')}</span>
                        </div>
                        ${item.name ? `<p><b>Name:</b> ${item.name}</p>` : ''}
                        ${item.issue ? `<p><b>Issue:</b> ${item.issue}</p>` : ''}
                        ${item.status ? `<p><b>Status:</b> ${item.status}</p>` : ''}
                        ${item.remark ? `<p><b>Action:</b> ${item.remark}</p>` : ''}
                        <div class="text-[9px] text-slate-400 mt-2 text-right">${item.timestamp}</div>
                    </div>
                `;
            });
        }

        // --- WhatsApp Generator Engine ---
        function shareWhatsApp(type) {
            let msg = '';
            if(type === 'ir') {
                msg = `*New Installation Received*\\nOrder ID: ${document.getElementById('ir-order').value}\\nISP: ${document.getElementById('ir-isp').value}\\nName: ${document.getElementById('ir-name').value}\\nMob: ${document.getElementById('ir-mobile').value}\\nAddress: ${document.getElementById('ir-address').value}\\nIPTV: ${document.getElementById('ir-iptv').value}`;
            } else if (type === 'ic') {
                msg = `*Installation Complete*\\nOrder ID: ${document.getElementById('ic-order').value}\\nFiber Length: ${document.getElementById('ic-length').value}m\\nFatbox: ${document.getElementById('ic-fatbox').value}\\nMAC: ${document.getElementById('ic-mac').value}\\nRemarks: ${document.getElementById('ic-remark').value}\\nStatus: Completed`;
            } else if (type === 'srr') {
                msg = `*SR Ticket Received*\\nTicket ID: ${document.getElementById('srr-ticket').value}\\nName: ${document.getElementById('srr-name').value}\\nMob: ${document.getElementById('srr-mobile').value}\\nIssue: ${document.getElementById('srr-issue').value}\\nAddress: ${document.getElementById('srr-address').value}`;
            } else if (type === 'srd') {
                msg = `*SR Ticket Resolved*\\nTicket ID: ${document.getElementById('srd-ticket').value}\\nFinal Rx Power: ${document.getElementById('srd-power').value}\\nAction Taken: ${document.getElementById('srd-action').value}\\nStatus: Resolved`;
            }
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- PDF Exporter ---
        function downloadPDF(elementId, fileName) {
            const element = document.getElementById(elementId);
            const opt = { margin: 10, filename: `${fileName}_${Date.now()}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        }

        // --- Excel Exporter from LocalStorage ---
        function exportExcel() {
            const db = getDB();
            if(db.length === 0) { alert("No data to export"); return; }
            const ws = XLSX.utils.json_to_sheet(db);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Master Database");
            XLSX.writeFile(wb, "Fiber_Operations_Log.xlsx");
        }
    </script>
</body>
</html>
